name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "dev" ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
        
      - name: Fix Git Trust
        run: git config --global --add safe.directory '*'
        
      - name: Check for Code Changes
        id: filter
        run: |
          # Get list of changed files
          # For PRs this might need smarter logic, but for simple push workflow this works
          CHANGED=$(git diff --name-only HEAD^ HEAD || git ls-files)
          
          echo "Changed files:"
          echo "$CHANGED"
          
          # Check if any file is a game file (.gd, .tscn, .tres, project.godot)
          if echo "$CHANGED" | grep -qE "\.(gd|tscn|tres|import|json|cfg)$|project\.godot|tests/"; then
            echo "run_tests=true" >> $GITHUB_OUTPUT
            echo "Game logic modified -> Running Tests"
          else
            echo "run_tests=false" >> $GITHUB_OUTPUT
            echo "Only non-game files modified -> Skipping Tests"
          fi

      - name: Setup
        if: steps.filter.outputs.run_tests == 'true'
        run: |
          mkdir -p ~/.config/godot
      
      - name: Import Project (Generate Cache)
        if: steps.filter.outputs.run_tests == 'true'
        run: godot --headless --editor --quit
          
      - name: Run Dynamic Tests
        if: steps.filter.outputs.run_tests == 'true'
        timeout-minutes: 15
        run: |
          echo "🔍 Discovering Tests..."
          FAIL=0
          
          # 1. Run all Test Scenes (*.tscn)
          find tests -name "*.tscn" | while read -r scene; do
            echo "🎬 Running Scene: $scene"
            godot --headless --path . "$scene"
            if [ $? -ne 0 ]; then
                echo "❌ FAILURE in $scene"
                touch .test_failed
                FAIL=1
            fi
          done
          
          # 2. Run Standalone Scripts
          find tests -name "*.gd" | while read -r script; do
            if grep -q -E "extends\s+(SceneTree|MainLoop)" "$script"; then
              echo "📜 Running Script: $script"
              godot --headless -s "$script"
              if [ $? -ne 0 ]; then
                  echo "❌ FAILURE in $script"
                  touch .test_failed
                  FAIL=1
              fi
            fi
          done
          
          if [ -f .test_failed ]; then
            echo "🔥 SOME TESTS FAILED"
            exit 1
          else
             echo "✅ ALL TESTS PASSED"
          fi

  build:
    name: 📦 Build
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Required for patch notes generation

      - name: Fix Git Trust
        run: git config --global --add safe.directory '*'

      - name: Setup PowerShell
        run: |
          apt-get update
          apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
          dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          apt-get update
          apt-get install -y powershell

      - name: Generate Version File
        shell: pwsh
        run: ./generate_version.ps1

      - name: Generate Patch Notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Write-Host "DEBUG: Ref is ${{ github.ref }}"
          $Version = "${{ github.ref_name }}".Substring(1)
          Write-Host "DEBUG: Detected Version: $Version"
          ./tools/generate_patch_notes.ps1 -Version $Version

      - name: Commit and Push Patch Notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check for changes to stash
          STASHED=0
          if [ -n "$(git status --porcelain)" ]; then
            echo "Stashing changes..."
            git stash --include-untracked
            STASHED=1
          fi
          
          # Switch to main branch to ensure we push to the correct target
          git fetch origin main
          git checkout main
          git pull origin main --rebase
          
          # Restore changes
          if [ "$STASHED" -eq 1 ]; then
            echo "Popping stash..."
            git stash pop
          fi
          
          git add patch_notes/
          git add scripts/core/Version.gd
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: generate patch notes and version file [skip ci]"
            git push origin main
          fi

      - name: Upload Patch Notes Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: patch-notes
          path: patch_notes/*.md

      - name: Setup Export Dir
        run: mkdir -p build/windows build/web

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip -q Godot_v4.5.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf templates Godot_v4.5.1-stable_export_templates.tpz
        
      - name: Export Windows
        run: |
          godot --headless --export-release "Windows Desktop" build/windows/Bark.exe
          
      - name: Export Web
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: Zip Builds
        run: |
          apt-get update && apt-get install -y zip
          cd build/windows && zip -r ../../windows_build.zip . && cd ../..
          cd build/web && zip -r ../../web_build.zip . && cd ../..

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows_build.zip
          
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web_build.zip

  deploy_itch:
    name: 🚀 Deploy to itch.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Deploy Windows
        uses: manleydev/butler-publish-itchio-action@master
        timeout-minutes: 60
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: bark-com
          ITCH_USER: eldritch-dream
          PACKAGE: windows_build.zip
          VERSION: ${{ github.ref_name }}

      - name: Deploy Web
        uses: manleydev/butler-publish-itchio-action@master
        timeout-minutes: 60
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: web
          ITCH_GAME: bark-com
          ITCH_USER: eldritch-dream
          PACKAGE: web_build.zip
          VERSION: ${{ github.ref_name }}

  release_github:
    name: 🏷️ Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Download Patch Notes
        uses: actions/download-artifact@v4
        with:
          name: patch-notes
          path: release_notes

      - name: Find Patch Notes File
        id: notes
        run: |
          ls -R release_notes
          FILE=$(find release_notes -name "release_*_patch_notes.md" | head -n 1)
          echo "patch_notes_file=$FILE" >> $GITHUB_OUTPUT
          echo "Found patch notes: $FILE"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows_build.zip
            web_build.zip
          body_path: ${{ steps.notes.outputs.patch_notes_file }}
          fail_on_unmatched_files: true
