name: Test Butler Fix (Manual)

on:
  workflow_dispatch:

jobs:
  test_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Minimal)
        uses: actions/checkout@v4
      
      - name: Setup Butler
        run: |
          echo "📥 Downloading Butler..."
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V
          
      - name: Verify Butler Status
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          echo "🔐 Verifying Credentials..."
          ./butler status

      - name: Dry Run Deploy (Simulation)
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          echo "🚀 Simulating Deployment (DRY RUN)..."
          # Create dummy files to simulate build artifacts
          mkdir -p windows_build web_build
          touch windows_build/game.exe web_build/index.html
          
          echo "--- Windows Deploy Simulation ---"
          ./butler push windows_build eldritch-dream/bark-com:windows --userversion test-v1 --dry-run
          
          echo "--- Web Deploy Simulation ---"
          ./butler push web_build eldritch-dream/bark-com:web --userversion test-v1 --dry-run
