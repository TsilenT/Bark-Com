<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Player Ally Theme: Light Background -->
  <circle cx="256" cy="256" r="240" fill="#ECEFF1" stroke="#455A64" stroke-width="16"/>

  <!-- Icon: Rank Insignia (Chevron + Star) -->
  <g transform="translate(256, 280) scale(0.9)">
      <!-- The Chevron (Support/Foundation) -->
      <path d="M-180 -20 
               L0 120 
               L180 -20 
               L180 50 
               L0 190 
               L-180 50 Z" 
               fill="#546E7A" stroke="#263238" stroke-width="8" filter="url(#shadow)"/>

      <!-- The Star (Potential/All-Rounder) -->
      <!-- Positioned above the chevron aka "rising star" -->
      <path d="M0 -220 
               L25 -140 L110 -140 
               L40 -90 L65 -10 
               L0 -60 
               L-65 -10 L-40 -90 
               L-110 -140 L-25 -140 Z" 
               fill="#FBC02D" stroke="#F57F17" stroke-width="8" filter="url(#shadow)"/>
  </g>
</svg>
